<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <style>
      .logo-text {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 52px;
        font-weight: 700;
        fill: #000000;
        letter-spacing: 14px;
      }
      .logo-line {
        stroke: #000000;
        stroke-width: 1.5;
      }
      .logo-subtitle {
        font-family: 'DM Sans', Arial, sans-serif;
        font-size: 9px;
        font-weight: 400;
        fill: #6b6b6b;
        letter-spacing: 5px;
      }
    </style>
  </defs>
  
  <!-- Main Logo Text -->
  <text x="50%" y="50" text-anchor="middle" class="logo-text">ARYA</text>
  
  <!-- Decorative Lines -->
  <line x1="15%" y1="65" x2="85%" y2="65" class="logo-line"/>
  
  <!-- Subtitle -->
  <text x="50%" y="85" text-anchor="middle" class="logo-subtitle">PREMIUM BARBER HOUSE</text>
</svg>
